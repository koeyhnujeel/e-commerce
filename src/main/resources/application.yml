spring:
  application.name: commerce

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update

  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${EMAIL}
    password: ${APP_PASSWORD}
    properties:
      "[mail.smtp.auth]": true
      "[mail.smtp.starttls.enable]": true
      "[mail.smtp.connectiontimeout]": 5000
      "[mail.smtp.timeout]": 3000
      "[mail.smtp.writetimeout]": 5000

jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS}

payment:
  toss:
    base-url: ${TOSS_PAYMENTS_BASE_URL}
    client-key: ${TOSS_PAYMENTS_CLIENT_KEY}
    secret-key: ${TOSS_PAYMENTS_SECRET_KEY}
    success-url: ${TOSS_PAYMENTS_SUCCESS_URL}
    fail-url: ${TOSS_PAYMENTS_FAIL_URL}
